name: Docker Build and Test

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  docker-build-test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Build Docker image
      run: docker build -t nodejs-api .
    
    - name: Run Docker container
      run: docker run -d -p 8080:8080 --name nodejs-api-container nodejs-api
    
    - name: Wait for container to be ready
      run: sleep 5
    
    - name: Test health endpoint
      run: |
        response=$(curl -s http://localhost:8080/health)
        echo "Response: $response"
        if echo "$response" | grep -q '"status":"OK"'; then
          echo "✅ Health check passed!"
        else
          echo "❌ Health check failed!"
          exit 1
        fi
    
    - name: Show container logs
      if: always()
      run: docker logs nodejs-api-container
    
    - name: Stop and remove container
      if: always()
      run: |
        docker stop nodejs-api-container || true
        docker rm nodejs-api-container || true
